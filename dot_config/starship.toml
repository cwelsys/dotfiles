"$schema" = "https://starship.rs/config-schema.json"

add_newline = false
command_timeout = 500
continuation_prompt = "[ÔØ»ÔØ» ](subtext0)"
palette = "mocha"
follow_symlinks = false

format = """
$directory\
$shell\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$fill\
$env_var \
$container \
$all \
$status\
$cmd_duration\
$jobs\
$os\
$hostname\
$line_break\
$username$character"""

[env_var.ZMX_SESSION]
variable = 'ZMX_SESSION'
format = '[¯»ê]($style)'
style = 'mauve'

[profiles]
transient = """
$character\
"""

rtransient = """
$status\
$cmd_duration\
"""

[os]
disabled = true
format = '[$symbol ](lavender)'

[fill]
disabled = false
symbol = " "

[status]
symbol = 'Ô£ÿ '
map_symbol = true
format = "[$symbol$status]($style) "
style = 'red'
disabled = false

[line_break]
disabled = false

[container]
format = ' [$symbol \[$name\]]($style) '
symbol = '¯ëÅ'

[character]
# error_symbol   = "[´æº](mauve)"
success_symbol = "[ÔØ»](peach)"
vimcmd_symbol = "[ÔØ«](peach)"

[battery]
disabled = true
full_symbol = '­ƒöï '
charging_symbol = 'ÔÜí´©Å '
discharging_symbol = '­ƒÆÇ '

[username]
disabled = true
aliases = { "Administrator" = '¾▒Éï ' }
format = '[$user]($style)'
style_root = 'mauve'
style_user = 'yellow'
# detect_env_vars = ['SSH_CONNECTION', '!SSH_CONNECTION']

[shell]
disabled = true
fish_indicator = '¾░ê║'
format = '[$indicator]($style)'
powershell_indicator = ''
style = 'teal'
unknown_indicator = '¯¼▓'
zsh_indicator = ''

[cmd_duration]
disabled = false
format = "[$duration]($style)"
style = "sapphire"

[directory]
fish_style_pwd_dir_length = 2
format = '[$path]($style)[$read_only]($read_only_style) '
read_only = " ¯»º"
read_only_style = 'overlay1'
style = "blue"
truncation_length = 2
use_os_path_sep = false

[hostname]
disabled = true
ssh_only = true
format = "[$hostname]($style)"
ssh_symbol = "¾░Ñø"
style = 'teal'

[git_state]
am = "¾░▓¥"
bisect = "¾▒óç"
cherry_pick = "¯èø "
format = ' [$state( $progress_current/$progress_total)]($style)'
merge = "¯£º"
rebase = "¯£¿"
revert = "´âó "
style = "red"

[git_status]
format = "[$all_status$ahead_behind]($style) "
conflicted = '[ ~${count}](red)'
ahead = "[ Ôçí${count}](green)"
behind = "[ Ôçú${count}](red)"
diverged = "[ ÔçòÔçí${ahead_count}](teal)[Ôçú${behind_count}](peach)"
untracked = "[ ?${count}](blue)"
stashed = "[ *${count}](subtext0)"
modified = "[ !${count}](yellow)"
staged = "[ +${count}](sapphire)"
renamed = "[ ┬╗${count}](peach)"
deleted = "[ Ô£ÿ${count}](mauve)"

[git_branch]
format = '[$symbol](overlay2)[$branch](mauve)'
symbol = '¯£Ñ '
truncation_length = 24
truncation_symbol = "ÔÇª"
#ignore_branches = ['master','main']

[git_commit]
format = "[@$hash]($style) "
style = "green"
only_detached = true
tag_disabled = false
tag_symbol = ' ´ÉÆ '

[git_metrics]
disabled = true
added_style = "green"
deleted_style = "red"
format = "([+$added]($added_style) )([-$deleted]($deleted_style) )"

