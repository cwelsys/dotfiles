# Catppuccin Mocha theme for Managarr
# https://github.com/catppuccin/catppuccin

- name: catppuccin-mocha
  theme:
    background:
      enabled: false
      color: "#1e1e2e"
    awaiting_import:
      color: "#fab387"
    indeterminate:
      color: "#7f849c"
    default:
      color: "#cdd6f4"
    downloaded:
      color: "#89b4fa"
    downloading:
      color: "#a6e3a1"
    failure:
      color: "#f38ba8"
    help:
      color: "#cba6f7"
    missing:
      color: "#bac2de"
    primary:
      color: "#89b4fa"
    secondary:
      color: "#89b4fa"
    success:
      color: "#a6e3a1"
    system_function:
      color: "#cba6f7"
    unmonitored:
      color: "#6c7086"
    unmonitored_missing:
      color: "#6c7086"
    unreleased:
      color: "#f5e0dc"
    warning:
      color: "#f9e2af"
