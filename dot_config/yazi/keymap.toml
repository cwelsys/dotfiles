[mgr]
prepend_keymap = [
  # ── git (g) ──────────────────────────────────────────────────────────
  { on = [ "g", "l" ], run = "plugin lazygit", desc = "Lazygit" },
  { on = [ "g", "h" ], run = 'shell "nvim $@ +GitFileHistory" --block', desc = "Git file history" },
  { on = [ "g", "s" ], run = "plugin vcs-files", desc = "Git file changes" },
  { on = [ "g", "d" ], run = "plugin diff", desc = "Diff hovered v selection" },
  { on = [ "g", "o" ], run = "plugin open-git-remote", desc = "Git Open" },
  { on = [ "g", "c" ], run = "noop" },
  { on = [ "g", "f" ], run = "noop" },
  { on = [ "g", "<Space>" ], run = "noop" },

  # ── search (s) ───────────────────────────────────────────────────────
  { on = [ "s", "g" ], run = "plugin yafg", desc = "rg" },
  { on = [ "s", "G" ], run = '''shell 'f=$(rga --files-with-matches --no-messages "" 2>/dev/null | fzf --preview "rga --pretty --context 5 {q} {}") && [ -n "$f" ] && ya emit reveal "$f"' --block''', desc = "rga" },
  { on = [ "s", "r" ], run = '''shell 'nvim +GrugFar' --block''', desc = "grug-far" },
  { on = [ "s", "s" ], run = "search --via=fd", desc = "fd" },

  # ── change (c) ───────────────────────────────────────────────────────
  { on = [ "c", "m" ], run = "plugin chmod", desc = "Chmod" },
  { on = [ "c", "a" ], run = "plugin augment-command.archive", desc = "Archive selected" },
  { on = [ "c", "r" ], run = "plugin rsync", desc = "rsync" },
  { on = [ "c", "s"],  run = "plugin croc-send", desc = "Send with croc" },
  { on = [ "c", "e" ], run = 'shell "sudo -e $@" --block --confirm', desc = "Sudo edit" },
  { on = [ "c", "x" ], run = "plugin command", desc = "Command prompt" },
  { on = [ "c", "y" ], run = "plugin copy-file-contents", desc = "Copy file contents" },

  # ── goto dirs (z) ────────────────────────────────────────────────────
  { on = [ "z", "h" ], run = "cd ~", desc = "Home" },
  { on = [ "z", "c" ], run = "cd ~/.config", desc = "~/.config" },
  { on = [ "z", "d" ], run = "cd ~/Downloads", desc = "Downloads" },
  { on = [ "z", "D" ], run = "cd ~/.local/share/dots", desc = "Dots" },
  { on = [ "z", "<Space>" ], run = "cd --interactive", desc = "Jump interactively" },
  { on = [ "z", "f" ], run = "follow", desc = "Follow symlink" },

  # ── tabs (t) ─────────────────────────────────────────────────────────
  { on = [ "t", "d" ], run = "close", desc = "Close current tab" },
  { on = "<", run = "tab_switch -1 --relative", desc = "Switch to previous tab" },
  { on = ">", run = "tab_switch 1 --relative",  desc = "Switch to next tab" },

  # ── linemode (m) ─────────────────────────────────────────────────────
  { on = [ "m", "c" ], run = "linemode size_mtime", desc = "Linemode: size + mtime" },
  { on = [ ",", "M" ], run = "sort mtime --reverse=no",  desc = "Sort by mtime" },
  { on = [ ",", "m" ], run = "sort mtime --reverse=yes", desc = "Sort by mtime (reverse)" },
  { on = [ ",", "B" ], run = "sort btime --reverse=no",  desc = "Sort by btime" },
  { on = [ ",", "b" ], run = "sort btime --reverse=yes", desc = "Sort by btime (reverse)" },
  { on = [ ",", "S" ], run = "sort size --reverse=no",   desc = "Sort by size" },
  { on = [ ",", "s" ], run = "sort size --reverse=yes",  desc = "Sort by size (reverse)" },

  # ── projects (b) ─────────────────────────────────────────────────────
  { on = [ "b", "s" ], run = "plugin projects save", desc = "Save current" },
  { on = [ "b", "l" ], run = "plugin projects load", desc = "Load projects" },
  { on = [ "b", "r" ], run = "plugin projects load_last", desc = "Restore Last" },
  { on = [ "b", "d" ], run = "plugin projects delete", desc = "Delete project" },
  { on = [ "b", "D" ], run = "plugin projects delete_all", desc = "Delete all projects" },
  { on = [ "b", "m" ], run = "plugin projects 'merge current'", desc = "Merge current tab" },
  { on = [ "b", "M" ], run = "plugin projects 'merge all'", desc = "Merge current project" },

  # ── singles ──────────────────────────────────────────────────────────
  { on = "l", run = "plugin augment-command.enter", desc = "Enter directory or open file" },
  { on = "F", run = "plugin smart-filter", desc = "Smart filter" },
  { on = "R", run = "plugin omni-trash", desc = "Trash menu" },
  { on = "u", run = "plugin restore", desc = "Restore last deleted" },
  { on = "U", run = "plugin restore -- --interactive", desc = "Restore (interactive)" },
  { on = "M", run = "plugin mount", desc = "Mount manager" },
  { on = "T", run = "plugin toggle-pane max-preview", desc = "Maximize/restore preview" },
  { on = "+", run = "plugin zoom 1", desc = "Zoom in preview" },
  { on = "-", run = "plugin zoom -1", desc = "Zoom out preview" },
  { on = "<A-e>", run = "excluded toggle", desc = "Toggle excluded files visibility" },
  { on = "<C-c>", run = "quit", desc = "Quit yazi" },
]
